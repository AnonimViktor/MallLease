services:
  postgres:
    image: postgres:16-alpine
    container_name: mall-lease-db
    environment:
      POSTGRES_DB: mall_lease
      POSTGRES_USER: mall_lease
      POSTGRES_PASSWORD: mall_lease_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./src/main/resources/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mall_lease"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:

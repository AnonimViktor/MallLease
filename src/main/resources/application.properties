# Mall Lease — runtime configuration.
# Any value here can be overridden by an environment variable of the same name
# (uppercase with dots replaced by underscores), e.g. DB_URL=jdbc:postgresql://...

db.url=jdbc:postgresql://localhost:5433/mall_lease
db.user=mall_lease
db.password=mall_lease_dev

# HikariCP pool sizing — values appropriate for a desktop client.
db.pool.maximumPoolSize=8
db.pool.minimumIdle=2
db.pool.connectionTimeoutMs=10000
db.pool.idleTimeoutMs=600000
db.pool.maxLifetimeMs=1800000
